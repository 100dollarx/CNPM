<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary-container": "#9bbaee",
            "on-primary-fixed-variant": "#91002b",
            "on-tertiary-fixed": "#002111",
            "on-tertiary-container": "#00311c",
            "on-error": "#690005",
            "on-secondary": "#09305c",
            "primary-fixed-dim": "#ffb2b7",
            "inverse-surface": "#dfe2eb",
            "outline": "#a9898a",
            "on-primary-fixed": "#40000e",
            "surface-tint": "#ffb2b7",
            "surface-container-low": "#181c22",
            "background": "#10141a",
            "on-error-container": "#ffdad6",
            "tertiary": "#67dc9f",
            "on-tertiary-fixed-variant": "#005232",
            "secondary": "#a9c8fc",
            "surface-container-high": "#262a31",
            "surface-container-lowest": "#0a0e14",
            "on-secondary-fixed-variant": "#274774",
            "on-primary": "#67001c",
            "inverse-on-surface": "#2d3137",
            "surface-container": "#1c2026",
            "tertiary-container": "#25a46d",
            "error-container": "#93000a",
            "on-tertiary": "#003921",
            "on-surface-variant": "#e2bebf",
            "tertiary-fixed-dim": "#67dc9f",
            "primary-fixed": "#ffdadb",
            "primary": "#ffb2b7",
            "outline-variant": "#5a4042",
            "on-background": "#dfe2eb",
            "secondary-fixed": "#d5e3ff",
            "surface-dim": "#10141a",
            "surface-variant": "#31353c",
            "on-primary-container": "#5b0017",
            "primary-container": "#fc536d",
            "secondary-fixed-dim": "#a9c8fc",
            "secondary-container": "#294a77",
            "error": "#ffb4ab",
            "surface": "#10141a",
            "tertiary-fixed": "#84f9ba",
            "surface-bright": "#353940",
            "on-surface": "#dfe2eb",
            "surface-container-highest": "#31353c",
            "on-secondary-fixed": "#001b3c",
            "inverse-primary": "#b71d3f"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Inter"],
            "label": ["Space Grotesk"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      background: rgba(41, 74, 119, 0.6);
      backdrop-filter: blur(12px);
    }
    .tactical-recess {
      background: #0a0e14;
      border-bottom: 2px solid #5a404226;
    }
  </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Shell Suppressed: Focus Journey (Side Selection) -->
<div class="min-h-screen flex flex-col relative overflow-hidden">
<!-- Tactical HUD Background Pattern -->
<div class="fixed inset-0 pointer-events-none opacity-5">
<div class="absolute inset-0" style="background-image: radial-gradient(#dfe2eb 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
<!-- Top Navigation Placeholder (Non-Shell) -->
<header class="flex justify-between items-center w-full px-8 h-20 z-10">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-surface-container flex items-center justify-center border border-outline-variant/20">
<span class="material-symbols-outlined text-primary text-xl" data-icon="grid_view">grid_view</span>
</div>
<div>
<p class="font-label text-[0.6875rem] tracking-[0.1em] text-outline">MATCH_ID</p>
<p class="font-headline font-bold text-sm">TX-7700-ALPHA</p>
</div>
</div>
<div class="flex items-center gap-6">
<div class="text-right">
<p class="font-label text-[0.6875rem] tracking-[0.1em] text-outline">STATUS</p>
<p class="font-headline font-bold text-sm text-primary uppercase">Pending Selection</p>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-4 py-12 z-10">
<!-- Match Header -->
<div class="text-center mb-16 max-w-4xl">
<div class="inline-block px-3 py-1 mb-4 bg-primary/10 border border-primary/20">
<p class="font-label text-[0.6875rem] tracking-[0.2em] text-primary font-bold">LOBBY_STATE: PRE-GAME</p>
</div>
<h1 class="font-headline text-4xl md:text-6xl font-black tracking-tighter uppercase mb-4 leading-none">
          GRAND FINALS: <span class="text-secondary">TEAM ALPHA</span> VS <span class="text-primary-container">VANGUARD</span>
</h1>
<div class="flex items-center justify-center gap-8">
<div class="h-[1px] w-12 bg-outline-variant/30"></div>
<p class="font-label text-outline tracking-widest">MAP: SUMMONER'S COMMAND</p>
<div class="h-[1px] w-12 bg-outline-variant/30"></div>
</div>
</div>
<!-- Selector Indicator -->
<div class="mb-10 flex flex-col items-center">
<div class="flex items-center gap-3 bg-surface-container-high px-6 py-3 border border-outline-variant/15">
<span class="material-symbols-outlined text-primary" data-icon="pending">pending</span>
<p class="font-label text-xs tracking-[0.1em]">CURRENT SELECTOR: <span class="text-on-background font-black">TEAM ALPHA</span></p>
</div>
<div class="w-[2px] h-8 bg-gradient-to-b from-primary to-transparent mt-2"></div>
</div>
<!-- Choice Cards Container -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl">
<!-- BLUE SIDE CARD -->
<button class="group relative flex flex-col items-center justify-between p-12 bg-surface-container-low transition-all duration-200 border border-transparent hover:border-secondary/40 active:scale-[0.98] focus:outline-none">
<!-- Background Glow Effect -->
<div class="absolute inset-0 bg-gradient-to-br from-secondary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="relative z-10 flex flex-col items-center">
<div class="w-24 h-24 mb-8 rounded-lg flex items-center justify-center bg-secondary-container/30 border border-secondary/20 transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-5xl text-secondary" data-icon="wb_sunny">wb_sunny</span>
</div>
<h2 class="font-headline text-4xl font-black text-secondary uppercase tracking-tight mb-2">BLUE SIDE</h2>
<p class="font-label text-[0.6875rem] text-on-secondary-container/70 tracking-[0.15em] mb-8">INITIATOR PROTOCOL</p>
</div>
<div class="relative z-10 w-full mt-8 p-4 bg-secondary-container/10 border-t border-secondary/10 flex justify-between items-center">
<p class="font-label text-[0.6875rem] text-secondary">FIRST PICK ADVANTAGE</p>
<span class="material-symbols-outlined text-secondary text-sm" data-icon="bolt">bolt</span>
</div>
<!-- Selection Border -->
<div class="absolute inset-0 border-2 border-secondary/0 group-hover:border-secondary/20 pointer-events-none transition-all"></div>
<div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-secondary opacity-0 group-hover:opacity-100 transition-all"></div>
<div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-secondary opacity-0 group-hover:opacity-100 transition-all"></div>
</button>
<!-- RED SIDE CARD -->
<button class="group relative flex flex-col items-center justify-between p-12 bg-surface-container-low transition-all duration-200 border border-transparent hover:border-primary/40 active:scale-[0.98] focus:outline-none">
<!-- Background Glow Effect -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="relative z-10 flex flex-col items-center">
<div class="w-24 h-24 mb-8 rounded-lg flex items-center justify-center bg-primary-container/10 border border-primary/20 transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-5xl text-primary" data-icon="nights_stay">nights_stay</span>
</div>
<h2 class="font-headline text-4xl font-black text-primary uppercase tracking-tight mb-2">RED SIDE</h2>
<p class="font-label text-[0.6875rem] text-primary/70 tracking-[0.15em] mb-8">COUNTER PROTOCOL</p>
</div>
<div class="relative z-10 w-full mt-8 p-4 bg-primary-container/5 border-t border-primary/10 flex justify-between items-center">
<p class="font-label text-[0.6875rem] text-primary">LAST PICK COUNTER-DRAFT</p>
<span class="material-symbols-outlined text-primary text-sm" data-icon="shield">shield</span>
</div>
<!-- Selection Border -->
<div class="absolute inset-0 border-2 border-primary/0 group-hover:border-primary/20 pointer-events-none transition-all"></div>
<div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-primary opacity-0 group-hover:opacity-100 transition-all"></div>
<div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-primary opacity-0 group-hover:opacity-100 transition-all"></div>
</button>
</div>
<!-- Footer Info -->
<div class="mt-16 w-full max-w-5xl flex flex-col md:flex-row justify-between items-center gap-6">
<div class="flex items-center gap-4">
<div class="flex -space-x-2">
<div class="w-8 h-8 bg-surface-container-highest border border-outline-variant/30 flex items-center justify-center">
<span class="material-symbols-outlined text-xs text-secondary" data-icon="person">person</span>
</div>
<div class="w-8 h-8 bg-surface-container-highest border border-outline-variant/30 flex items-center justify-center">
<span class="material-symbols-outlined text-xs text-secondary" data-icon="person">person</span>
</div>
<div class="w-8 h-8 bg-surface-container-highest border border-outline-variant/30 flex items-center justify-center">
<span class="material-symbols-outlined text-xs text-secondary" data-icon="person">person</span>
</div>
</div>
<p class="font-label text-[0.6875rem] text-outline tracking-widest uppercase">Team Members Ready</p>
</div>
<div class="flex items-center gap-2 text-primary font-black font-label text-sm animate-pulse">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
<span>15s REMAINING</span>
</div>
<div class="flex items-center gap-6">
<button class="text-outline hover:text-primary transition-colors font-label text-xs tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="settings">settings</span>
            CONFIG
          </button>
<div class="h-4 w-[1px] bg-outline-variant/20"></div>
<button class="text-outline hover:text-primary transition-colors font-label text-xs tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="chat">chat</span>
            COMMS
          </button>
</div>
</div>
</main>
<!-- Bottom Decor/Status Bar -->
<footer class="h-1 w-full bg-surface-container-highest relative overflow-hidden">
<div class="absolute top-0 left-0 h-full bg-primary w-1/4"></div>
<div class="absolute top-0 left-1/4 h-full bg-secondary w-1/2 opacity-20"></div>
</footer>
</div>
<!-- Decorative Overlay -->
<div class="fixed inset-0 pointer-events-none z-50">
<div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-background to-transparent opacity-60"></div>
<div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-background to-transparent opacity-60"></div>
<!-- Scanline effect -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%;"></div>
</div>
</body></html>
