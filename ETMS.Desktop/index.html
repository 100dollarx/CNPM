<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXORA — Esports Tournament Platform</title>
    <meta name="description" content="NEXORA — Hệ thống quản lý giải đấu Esports chuyên nghiệp. Hỗ trợ MOBA, FPS, Battle Royale và nhiều thể loại game khác." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #050811;
        color: #e2e8f0;
        font-family: 'Be Vietnam Pro', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-width: 820px;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(233,69,96,0.4); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(233,69,96,0.7); }
      input, select, textarea, button { font-family: inherit; }
      a { text-decoration: none; color: inherit; }
      ::selection { background: rgba(233,69,96,0.4); color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
